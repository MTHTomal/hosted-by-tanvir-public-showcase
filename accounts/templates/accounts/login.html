{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block content %}
<div class="min-h-[75vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <a
                href="{% url 'tournament:home' %}"
                class="inline-flex items-center"
            >
                <span class="font-light text-forest text-xl tracking-tight"
                    >Hosted by
                </span>
                <span
                    class="font-display font-bold text-brand text-xl ml-1 tracking-tight"
                    >Tanvir</span
                >
            </a>
            <p class="text-gray-400 text-sm mt-2">
                E-Football Tournament Platform
            </p>
        </div>

        <div class="card p-7">
            <h1 class="text-xl font-display font-bold text-forest mb-6">
                Welcome back
            </h1>

            <form method="post" novalidate class="space-y-4">
                {% csrf_token %}

                <div class="form-group">
                    <label class="form-label" for="id_email">Email</label>
                    <input
                        id="id_email"
                        name="email"
                        type="email"
                        required
                        autocomplete="email"
                        placeholder="your@email.com"
                        value="{{ request.POST.email|default:'' }}"
                    />
                </div>

                <div class="form-group">
                    <label class="form-label" for="id_password">Password</label>
                    <input
                        id="id_password"
                        name="password"
                        type="password"
                        required
                        autocomplete="current-password"
                        placeholder="••••••••"
                    />
                </div>

                <div class="text-right mb-2">
                    <a
                        href="{% url 'accounts:password_reset' %}"
                        class="text-sm text-gray-500 hover:text-brand transition-colors"
                    >
                        Forgot password?
                    </a>
                </div>

                <button type="submit" class="btn-primary btn-lg w-full mt-1">
                    Sign in
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-gray-400 mt-5">
            New here?
            <a
                href="{% url 'accounts:register' %}"
                class="text-brand font-medium hover:text-brand-dark transition-colors"
            >
                Create an account
            </a>
        </p>
    </div>
</div>
{% endblock %}
