{% extends "base.html" %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="min-h-[75vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <a
                href="{% url 'tournament:home' %}"
                class="inline-flex items-center"
            >
                <span class="font-light text-forest text-xl tracking-tight"
                    >Hosted by
                </span>
                <span
                    class="font-display font-bold text-brand text-xl ml-1 tracking-tight"
                    >Tanvir</span
                >
            </a>
            <p class="text-gray-400 text-sm mt-2">
                E-Football Tournament Platform
            </p>
        </div>

        <div class="card p-7">
            <div class="text-center">
                <div class="text-4xl mb-4">✓</div>
                <h1 class="text-xl font-display font-bold text-forest mb-2">
                    Password reset complete
                </h1>
                <p class="text-gray-500 text-sm mb-6">
                    Your password has been successfully reset. You can now sign in with your new password.
                </p>
            </div>

            <a
                href="{% url 'accounts:login' %}"
                class="btn-primary btn-lg w-full inline-block text-center"
            >
                Sign In
            </a>
        </div>
    </div>
</div>
{% endblock %}
